<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decks</title>
    <link rel="stylesheet" href="../css/deck.css">
    <link rel="stylesheet" href="../css/card-details.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mana-font@latest/css/mana.css">
</head>
<body>

    <div class="topbar">
        <div class="search-box">
            <div class="search-icon" id="topbar-search-trigger"></div>
            <input type="text" id="topbar-search-input" class="text-input" placeholder="Search...">
        </div>
        <button class="btn" onclick="window.location.href='/pages/search.html'">FILTERS</button>
        <button class="btn active">DECKS</button>
        <button class="btn" onclick="window.location.href='/pages/play.html'">PLAY</button>
    </div>

    <div class="view-container">

        <div class="view active" id="view-hub">
            <input type="file" id="input-import-file" accept=".json,.txt" style="display: none;">
            <div class="deck-hub-grid" id="deck-hub-grid"></div>
        </div>

        <div class="view" id="view-detail">
            <div class="deck-sidebar">
                <div class="deck-sidebar-header">
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1;">
                            <button class="btn-back" id="btn-back-hub">&#8592;</button>
                            <div style="min-width: 0; flex: 1;">
                                <h2 class="detail-deck-name" id="detail-deck-name" style="margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></h2>
                                <p class="detail-commander-name" id="detail-commander-name" style="margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
                            </div>
                        </div>
                        <button class="btn btn-export" id="btn-export-deck" style="min-width: auto; height: 32px; padding: 0 12px; font-size: 12px; margin-left: 10px;">EXPORT</button>
                        <button class="btn btn-stats" id="btn-stats-deck" style="min-width: auto; height: 32px; padding: 0 8px; font-size: 12px; margin-left: 6px;">STATS</button>
                    </div>
                    <div id="deck-warnings" class="deck-warning-panel"></div>
                </div>
                <div class="deck-list-wrapper" id="deck-list-wrapper"></div>
            </div>
            <div class="detail-grid-container" id="detail-grid-container"></div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-inner">
                    <button class="sidebar-close" id="sidebar-close">&times;</button>
                    <img class="sidebar-img" id="sidebar-img" src="" alt="">
                    <h2 class="sidebar-title" id="sidebar-title"></h2>
                    <div class="sidebar-type" id="sidebar-type"></div>
                    <div class="sidebar-text" id="sidebar-text"></div>
                    <div class="sidebar-stats" id="sidebar-stats"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal">
            <h2 class="modal-title">NEW DECK</h2>
            <form id="form-create-deck" style="display:flex; flex-direction:column; gap:15px;">
                <div class="form-group">
                    <label>Deck Name</label>
                    <input type="text" id="input-deck-name" class="modal-input" required>
                </div>
                <div class="form-group">
                    <label>Commander</label>
                    <input type="text" id="input-commander" class="modal-input" placeholder="e.g. Atraxa, Praetors' Voice" required>
                </div>
                <div class="form-group">
                    <label>Labels (comma separated)</label>
                    <input type="text" id="input-labels" class="modal-input">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="input-info" class="modal-textarea"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="close-modal">CANCEL</button>
                    <button type="submit" class="btn" id="btn-create-deck">CREATE DECK</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/card-details.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/deck.js"></script>

</body>
</html>
